<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weryfikacja - JustAndrew CAPTCHA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .captcha-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 420px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .img-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            width: 350px;
            height: 250px;
        }

        #captcha-img, .success-view img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: crosshair;
        }

        #selection-box {
            position: absolute;
            border: 2px solid #0056b3;
            background: rgba(0, 86, 179, 0.2);
            pointer-events: none;
            display: none;
        }

        .footer-note {
            font-size: 0.85em;
            color: #888;
            margin-top: 15px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .success-view {
            display: none;
        }
    </style>
</head>
<body>

<div class="captcha-container" id="captcha-view">
    <h2>Zabezpieczenie przed botami</h2>
    <p>Zaznacz wszystkie kwadraty, na których znajduje się <strong>JustAndrew</strong>, a następnie kliknij przycisk.</p>

    <div class="img-wrapper" id="img-wrapper">
        <img id="captcha-img" src="https://i.ibb.co/3ykG4g5/andrew1.jpg" alt="Obrazek weryfikacyjny" onclick="handleImageClick(event)">
        <div id="selection-box"></div>
    </div>

    <br>
    <button class="btn" onclick="verifySelection()">Zweryfikuj</button>
    
    <div class="footer-note">Weryfikacja CAPTCHA Powered by JustAndrew</div>
</div>

<div class="captcha-container success-view" id="success-view">
    <h2>Weryfikacja zakończona sukcesem!</h2>
    <p>Dziękujemy, oto właściwy widok:</p>
    
    <div class="img-wrapper">
        <img src="https://i.ibb.co/C0V4q0q/andrew2.jpg" alt="Drugi etap">
    </div>
    
    <button class="btn" onclick="resetCaptcha()">Zresetuj</button>
</div>

<script>
    let clickConfirmed = false;

    function handleImageClick(event) {
        const img = document.getElementById('captcha-img');
        const rect = img.getBoundingClientRect();
        
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        
        const selection = document.getElementById('selection-box');
        selection.style.left = (x - 25) + 'px';
        selection.style.top = (y - 25) + 'px';
        selection.style.width = '50px';
        selection.style.height = '50px';
        selection.style.display = 'block';

        const percentageX = (x / rect.width) * 100;
        const percentageY = (y / rect.height) * 100;

        // Obszar na którym znajduje się postać (głowa) na zdjęciu 1
        if (percentageX >= 30 && percentageX <= 48 && percentageY >= 58 && percentageY <= 75) {
            clickConfirmed = true;
        } else {
            clickConfirmed = false;
        }
    }

    function verifySelection() {
        if (clickConfirmed) {
            document.getElementById('captcha-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
        } else {
            alert('Niepoprawne zaznaczenie. Spróbuj ponownie.');
            resetSelection();
        }
    }

    function resetSelection() {
        document.getElementById('selection-box').style.display = 'none';
        clickConfirmed = false;
    }

    function resetCaptcha() {
        document.getElementById('success-view').style.display = 'none';
        document.getElementById('captcha-view').style.display = 'block';
        resetSelection();
    }
</script>

</body>
</html>
