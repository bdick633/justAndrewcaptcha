<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weryfikacja - JustAndrew CAPTCHA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .captcha-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 420px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .img-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            max-width: 380px;
            cursor: pointer;
        }

        #captcha-img, .success-view img {
            width: 100%;
            height: auto;
            max-height: 280px;
            display: block;
        }

        /* Styl kwadratu zaznaczenia */
        #selection-box {
            position: absolute;
            border: 2px solid #0056b3;
            background: rgba(0, 86, 179, 0.2);
            pointer-events: none;
            display: none;
            border-radius: 3px;
        }

        .footer-note {
            font-size: 0.85em;
            color: #888;
            margin-top: 15px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .success-view {
            display: none;
        }
    </style>
</head>
<body>

<div class="captcha-container" id="captcha-view">
