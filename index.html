<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weryfikacja - JustAndrew CAPTCHA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .captcha-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 420px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            margin-bottom: 20px;
            background-color: #bbb;
            padding: 1px;
            border-radius: 4px;
        }

        .grid-item {
            position: relative;
            width: 124px;
            height: 90px;
            background-color: #fff;
            cursor: pointer;
            overflow: hidden;
            border-radius: 1px;
        }

        .grid-item img {
            width: 372px;
            height: 270px;
            object-fit: cover;
        }

        /* Wycinki z pliku andrew1.png */
        .item-0 img { margin-left: 0; margin-top: 0; }
        .item-1 img { margin-left: -124px; margin-top: 0; }
        .item-2 img { margin-left: -248px; margin-top: 0; }
        .item-3 img { margin-left: 0; margin-top: -90px; }
        .item-4 img { margin-left: -124px; margin-top: -90px; }
        .item-5 img { margin-left: -248px; margin-top: -90px; }
        .item-6 img { margin-left: 0; margin-top: -180px; }
        .item-7 img { margin-left: -124px; margin-top: -180px; }
        .item-8 img { margin-left: -248px; margin-top: -180px; }

        .grid-item.selected::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 4px;
            background-color: #1a73e8;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .grid-item.selected {
            outline: 2px solid #1a73e8;
            z-index: 10;
        }

        .footer-note {
            font-size: 0.80em;
            color: #888;
            margin-top: 15px;
        }

        .btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #155bb5;
        }

        .success-view {
            display: none;
        }
        
        .success-view img {
            width: 100%;
            max-height: 280px;
            border-radius: 6px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="captcha-container" id="captcha-view">
    <h2>Zabezpieczenie przed botami</h2>
    <p>Zaznacz wszystkie kwadraty, na których znajduje się <strong>JustAndrew</strong>, a następnie kliknij przycisk.</p>

    <div class="grid-container" id="captcha-grid">
        <div class="grid-item item-0" onclick="toggleSelection(0)"><img src="andrew1.png" alt="Kafelek"></div>
        <div class="grid-item item-1" onclick="toggleSelection(1)"><img src="andrew1.png" alt="Kafelek"></div>
        <div class="grid-item item-2" onclick="toggleSelection(2)"><img src="andrew1.png" alt="Kafelek"></div>
        <div class="grid-item item-3" onclick="toggleSelection(3)"><img src="andrew1.png" alt="Kafelek"></div>
        <div class="grid-item item-4" onclick="toggleSelection(4)"><img src="andrew1.png" alt="Kafelek"></div>
        <div class="grid-item item-5" onclick="toggleSelection(5)"><img src="andrew1.png" alt="Kafelek"></div>
        <div class="grid-item item-6" onclick="toggleSelection(6)"><img src="andrew1.png" alt="Kafelek"></div>
        <div class="grid-item item-7" onclick="toggleSelection(7)"><img src="andrew1.png" alt="Kafelek"></div>
        <div class="grid-item item-8" onclick="toggleSelection(8)"><img src="andrew1.png" alt="Kafelek"></div>
    </div>

    <br>
    <button class="btn" onclick="verifySelection()">Zweryfikuj</button>
    
    <div class="footer-note">Weryfikacja CAPTCHA Powered by JustAndrew</div>
</div>

<div class="captcha-container success-view" id="success-view">
    <h2>Weryfikacja zakończona sukcesem!</h2>
    <p>Dziękujemy, oto właściwy widok:</p>
    
    <img src="andrew2.jpg" alt="Drugi etap">
    
    <br>
    <button class="btn" onclick="resetCaptcha()">Zresetuj</button>
</div>

<script>
    // Poprawne kafelki (0, 1, 2 odpowiadające górnemu wierszowi ze zdjęcia)
    const correctTiles = [0, 1, 2];
    let selectedTiles = new Set();

    function toggleSelection(index) {
        const gridItems = document.querySelectorAll('.grid-item');
        const item = gridItems[index];

        if (selectedTiles.has(index)) {
            selectedTiles.delete(index);
            item.classList.remove('selected');
        } else {
            selectedTiles.add(index);
            item.classList.add('selected');
        }
    }

    function verifySelection() {
        if (selectedTiles.size !== correctTiles.length) {
            alert('Zaznacz poprawną liczbę elementów.');
            return;
        }

        let isCorrect = true;
        for (let tile of correctTiles) {
            if (!selectedTiles.has(tile)) {
                isCorrect = false;
                break;
            }
        }

        if (isCorrect) {
            document.getElementById('captcha-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
        } else {
            alert('Niepoprawne zaznaczenie. Spróbuj ponownie.');
            resetCaptchaSelection();
        }
    }

    function resetCaptchaSelection() {
        selectedTiles.clear();
        document.querySelectorAll('.grid-item').forEach(item => {
            item.classList.remove('selected');
        });
    }

    function resetCaptcha() {
        document.getElementById('success-view').style.display = 'none';
        document.getElementById('captcha-view').style.display = 'block';
        resetCaptchaSelection();
    }
</script>

</body>
</html>
